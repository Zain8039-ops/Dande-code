<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Dande Code</title>
  <link rel="stylesheet" href="css/signup.css"/>
</head>
<body>

  <div class="signup-page">
    <div class="signup-card">

      <div class="top-icon">✦</div>

      <h1>Join Dande Code!</h1>
      <p class="subtitle">Create your coding adventure</p>

      <p class="avatar-title">Choose Your Avatar</p>

      <div class="avatar-grid">
        <div class="avatar-box active">🦁</div>
        <div class="avatar-box">🐼</div>
        <div class="avatar-box">🦊</div>
        <div class="avatar-box">🐸</div>
        <div class="avatar-box">🦄</div>
        <div class="avatar-box">🐨</div>
        <div class="avatar-box">🐯</div>
        <div class="avatar-box">🐰</div>
      </div>

      <div class="form-group">
        <label>Your Name</label>
        <input type="text" placeholder="Enter your name" />
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" placeholder="Your cool username" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Your secret password" />
      </div>

      <button class="main-btn">Start Adventure! 🚀</button>

      <p class="login-text">Already have an account? <span>Log in</span></p>

      <div class="divider"></div>

      <p class="role-text">Are you a parent or teacher?</p>

      <div class="role-buttons">
        <button class="role-btn parent-btn">Parent Login</button>
        <button class="role-btn teacher-btn">Teacher Login</button>
      </div>

    </div>

   <p class="back-home"><a href="index.html">← Back to Home</a></p>
  </div>

</body>
</html>
