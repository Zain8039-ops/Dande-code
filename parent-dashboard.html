<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - Dande Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8faff; overflow-x: hidden; }
        .sidebar-link.active { background-color: #eff6ff; color: #3b82f6; border-right: 4px solid #3b82f6; }
        .progress-bar-fill { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
        .page-section { display: none; animation: fadeIn 0.5s ease-out; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-100 hidden md:flex flex-col fixed h-full z-50">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-star"></i>
            </div>
            <span class="text-xl font-extrabold text-[#5c6bc0]">Dande Code</span>
        </div>

        <nav class="flex-1 mt-4 px-4 space-y-2">
            <a href="javascript:void(0)" onclick="showSection('dashboard', this)" class="sidebar-link active flex items-center gap-4 p-4 rounded-xl font-bold transition-all">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a href="javascript:void(0)" onclick="showSection('progress', this)" class="sidebar-link text-gray-400 flex items-center gap-4 p-4 rounded-xl font-bold hover:bg-gray-50 transition-all">
                <i class="fas fa-child"></i> Child Progress
            </a>
            <a href="javascript:void(0)" onclick="showSection('reports', this)" class="sidebar-link text-gray-400 flex items-center gap-4 p-4 rounded-xl font-bold hover:bg-gray-50 transition-all">
                <i class="fas fa-file-alt"></i> Reports
            </a>
            <a href="javascript:void(0)" onclick="showSection('settings', this)" class="sidebar-link text-gray-400 flex items-center gap-4 p-4 rounded-xl font-bold hover:bg-gray-50 transition-all">
                <i class="fas fa-cog"></i> Settings
            </a>
        </nav>

        <div class="p-6 mt-auto">
            <a href="parent-login.html" class="flex items-center gap-4 p-4 text-red-400 font-bold hover:bg-red-50 rounded-xl transition-all">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </aside>

    <main class="flex-1 md:ml-64 p-6 md:p-10">
        
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-extrabold text-[#5c6bc0]">Welcome Back, <span id="parent-name">Parent</span>! 👋</h1>
                <p class="text-gray-400 font-semibold" id="header-subtitle">Monitoring Student's coding journey.</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-100 rounded-full border-2 border-white shadow-sm overflow-hidden">
                    <img id="parent-avatar" src="https://ui-avatars.com/api/?name=Parent" alt="Profile">
                </div>
            </div>
        </header>

        <div id="dashboard" class="page-section active">
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-white p-6 rounded-[30px] shadow-sm border border-gray-50 flex items-center gap-5">
                    <div class="w-14 h-14 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-bolt"></i></div>
                    <div><p class="text-gray-400 font-bold text-sm">Courses Completed</p><h3 id="stat-courses" class="text-2xl font-extrabold text-[#5c6bc0]">0</h3></div>
                </div>
                <div class="bg-white p-6 rounded-[30px] shadow-sm border border-gray-50 flex items-center gap-5">
                    <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-clock"></i></div>
                    <div><p class="text-gray-400 font-bold text-sm">Learning Hours</p><h3 id="stat-hours" class="text-2xl font-extrabold text-[#5c6bc0]">0h</h3></div>
                </div>
                <div class="bg-white p-6 rounded-[30px] shadow-sm border border-gray-50 flex items-center gap-5">
                    <div class="w-14 h-14 bg-yellow-100 text-yellow-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-trophy"></i></div>
                    <div><p class="text-gray-400 font-bold text-sm">Badges Earned</p><h3 id="stat-badges" class="text-2xl font-extrabold text-[#5c6bc0]">0</h3></div>
                </div>
            </section>

            <section class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-50 mb-10">
                <h2 class="text-xl font-extrabold text-[#5c6bc0] mb-8">Learning Progress ! ✨</h2>
                <div class="space-y-8" id="progress-container">
                    </div>
            </section>
        </div>

        <div id="progress" class="page-section">
            <div class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-50">
                <h2 class="text-2xl font-extrabold text-[#5c6bc0] mb-6">Detailed Skill Map</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="detailed-skills">
                    </div>
            </div>
        </div>

        <div id="reports" class="page-section">
            <div class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-50">
                <h2 class="text-2xl font-extrabold text-[#5c6bc0] mb-6">Learning Reports</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-400 border-b border-gray-50">
                                <th class="pb-4 font-bold">Month</th>
                                <th class="pb-4 font-bold">Activities</th>
                                <th class="pb-4 font-bold">Status</th>
                                <th class="pb-4 font-bold">Action</th>
                            </tr>
                        </thead>
                        <tbody id="reports-table">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="settings" class="page-section">
            <div class="max-w-2xl bg-white p-8 rounded-[40px] shadow-sm border border-gray-50">
                <h2 class="text-2xl font-extrabold text-[#5c6bc0] mb-8">Profile Settings</h2>
                <form class="space-y-6" onsubmit="event.preventDefault(); alert('Settings Saved!');">
                    <div>
                        <label class="block text-gray-400 font-bold mb-2">Parent Name</label>
                        <input type="text" id="input-parent-name" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 font-bold mb-2">Email Address</label>
                        <input type="email" value="parent@dandecode.com" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="flex items-center gap-4">
                        <button class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">Save Changes</button>
                        <button type="button" class="text-gray-400 font-bold">Reset Password</button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <script>
        // بيانات محاكية (Mock Data) جاهزة للتبديل بـ API
        const studentData = {
            parentName: "Sarah Ahmed",
            childName: "Omar",
            coursesCompleted: 15,
            learningHours: 52,
            badgesEarned: 31,
            progress: [
                { name: "Logic & Problem Solving", val: 92, color: "blue" },
                { name: "Python Basics", val: 75, color: "purple" },
                { name: "Game Design", val: 55, color: "green" },
                { name: "Web Development", val: 30, color: "yellow" }
            ],
            reports: [
                { month: "March 2024", activities: "12 Lessons", status: "Completed" },
                { month: "February 2024", activities: "10 Lessons", status: "Completed" },
                { month: "January 2024", activities: "8 Lessons", status: "Completed" }
            ]
        };

        // وظيفة التنقل بين الأقسام
        function showSection(sectionId, element) {
            // إخفاء كل الأقسام
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            // إظهار القسم المطلوب
            document.getElementById(sectionId).classList.add('active');
            
            // تحديث حالة القائمة الجانبية
            document.querySelectorAll('.sidebar-link').forEach(l => {
                l.classList.remove('active');
                l.classList.add('text-gray-400');
            });
            element.classList.add('active');
            element.classList.remove('text-gray-400');

            // تحديث العنوان الفرعي بناءً على القسم
            const subtitle = document.getElementById('header-subtitle');
            if(sectionId === 'dashboard') subtitle.innerText = `Monitoring ${studentData.childName}'s coding journey.`;
            else if(sectionId === 'progress') subtitle.innerText = "Detailed analysis of every coding skill.";
            else if(sectionId === 'reports') subtitle.innerText = "Download and view performance history.";
            else if(sectionId === 'settings') subtitle.innerText = "Manage your account preferences.";
        }

        // تحديث البيانات ديناميكياً
        function initDashboard() {
            document.getElementById('parent-name').innerText = studentData.parentName;
            document.getElementById('input-parent-name').value = studentData.parentName;
            document.getElementById('parent-avatar').src = `https://ui-avatars.com/api/?name=${studentData.parentName}&background=3b82f6&color=fff`;

            // إحصائيات الداش بورد
            animateValue("stat-courses", 0, studentData.coursesCompleted, 1000);
            animateValue("stat-hours", 0, studentData.learningHours, 1000, "h");
            animateValue("stat-badges", 0, studentData.badgesEarned, 1000);

            // بناء أشرطة التقدم
            const container = document.getElementById('progress-container');
            const detailedContainer = document.getElementById('detailed-skills');
            
            studentData.progress.forEach(p => {
                // للداش بورد
                container.innerHTML += `
                    <div>
                        <div class="flex justify-between mb-3 font-bold">
                            <span class="text-gray-600">${p.name}</span>
                            <span class="text-${p.color}-600">${p.val}%</span>
                        </div>
                        <div class="w-full bg-gray-100 h-4 rounded-full overflow-hidden">
                            <div class="bg-${p.color}-500 h-full rounded-full progress-bar-fill" style="width: ${p.val}%"></div>
                        </div>
                    </div>`;

                // لصفحة الـ Progress التفصيلية
                detailedContainer.innerHTML += `
                    <div class="p-6 bg-gray-50 rounded-[30px] border border-gray-100">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-${p.color}-500 shadow-sm"><i class="fas fa-check-circle"></i></div>
                            <h4 class="font-bold text-gray-700">${p.name}</h4>
                        </div>
                        <div class="text-3xl font-black text-gray-800 mb-2">${p.val}%</div>
                        <p class="text-sm text-gray-400">Mastery Level reached</p>
                    </div>`;
            });

            // بناء جدول التقارير
            const table = document.getElementById('reports-table');
            studentData.reports.forEach(r => {
                table.innerHTML += `
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-all">
                        <td class="py-6 font-bold text-gray-700">${r.month}</td>
                        <td class="py-6 text-gray-500">${r.activities}</td>
                        <td class="py-6"><span class="bg-green-100 text-green-600 px-4 py-1 rounded-full text-xs font-bold">${r.status}</span></td>
                        <td class="py-6"><button class="text-blue-500 font-bold"><i class="fas fa-download mr-2"></i>PDF</button></td>
                    </tr>`;
            });
        }

        // عداد الأرقام
        function animateValue(id, start, end, duration, suffix = "") {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + suffix;
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.addEventListener('load', initDashboard);
    </script>
</body>
</html>
