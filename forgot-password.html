<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Dande Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        .bg-gradient-custom { background: linear-gradient(135deg, #f0f6ff 0%, #e5edff 100%); }
        .btn-gradient { background: linear-gradient(90deg, #9b4dff 0%, #3a7bd5 100%); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        /* ضبط الحقول لتكون الكتابة من اليسار */
        input {
            text-align: left !important;
        }
    </style>
</head>
<body class="bg-gradient-custom min-h-screen flex items-center justify-center p-4">

    <main class="bg-white w-full max-w-[480px] rounded-[40px] shadow-2xl p-10 text-center relative overflow-hidden">
        
        <div class="relative h-32 flex justify-center items-center mb-6">
            <div class="text-6xl text-blue-500 animate-float relative z-10">
                <i class="fas fa-robot"></i>
                <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-md text-2xl">🔑</div>
            </div>
            <span class="absolute top-0 left-1/4 text-yellow-400 text-xl">⭐</span>
            <span class="absolute top-4 right-1/4 text-yellow-300 text-2xl">✨</span>
            <span class="absolute bottom-4 left-1/3 text-yellow-400 text-lg">⭐</span>
        </div>

        <div class="flex items-center justify-center mb-4">
            <h1 class="text-3xl font-[800] text-[#5c6bc0] flex flex-row-reverse items-center gap-1">
                <span>!</span>
                <span>Forgot Password</span>
            </h1>
        </div>

        <p class="text-[#7c86a1] font-semibold mb-10 px-4">Enter your email and we'll send you a magic link!</p>

        <form action="#" class="space-y-8">
            <div class="text-left">
                <label class="block font-bold text-gray-700 mb-3 ml-2">Email Address or Username</label>
                <div class="relative">
                    <i class="far fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
                    <input type="email" placeholder="Your email address" 
                           class="w-full bg-[#fcfdfe] border-2 border-[#f0f2f5] rounded-[22px] py-5 pl-14 pr-4 outline-none focus:border-[#9b4dff] transition-all text-lg">
                </div>
            </div>

            <button type="submit" class="w-full btn-gradient text-white font-extrabold py-5 rounded-[22px] shadow-xl text-xl hover:shadow-2xl transition-all flex items-center justify-center gap-2">
                <span class="flex flex-row-reverse items-center gap-1">
                    <span>✨ !</span>
                    <span>Send Reset Link</span>
                </span>
            </button>
        </form>

        <div class="mt-8">
            <a href="login.html" class="text-[#a855f7] font-extrabold text-lg hover:underline decoration-2">Back to Login</a>
        </div>

        <div class="mt-12 bg-yellow-50 border-2 border-dashed border-yellow-200 rounded-[25px] p-5 flex items-center justify-center gap-4">
            <span class="text-3xl">🎖️</span>
            <p class="text-yellow-800 font-bold text-sm">Don't worry, we'll get you back to coding soon!</p>
        </div>
    </main>

</body>
</html>
